name: 📡 Live Stream Pro

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: 💾 Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-6.1-ubuntu

      - name: 📦 Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq

      - name: 📦 Install Python deps
        run: pip install flask pyzmq pyngrok --quiet

      - name: 🚀 Start Stream
        env:
          INPUT_URL:   ${{ secrets.INPUT_URL }}
          OUTPUT_URL:  ${{ secrets.OUTPUT_URL }}
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: python stream.py
